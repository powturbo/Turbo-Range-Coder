name: build
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  linux:
    runs-on: '${{ matrix.os }}'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
        compiler: ["gcc", "clang"]
    env:      
      CC: ${{ matrix.compiler }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'     
      - run: git submodule update --init --recursive
      - run: make STATIC=1
      - run: lscpu
      - run: ./turborc -e0 turborc -V1

  macos:
    runs-on: '${{ matrix.os }}'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
        compiler: ["clang"]
    env:      
      CC: ${{ matrix.compiler }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
      - run: git submodule update --init --recursive
      - run: make
      - run: sysctl -n machdep.cpu.brand_string
      - run: ./turborc -e0 turborc -V1

  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: git make mingw-w64-x86_64-gcc
          update: true
      - run: git submodule update --init --recursive
      - run: make STATIC=1
      - run: ./turborc -e0 turborc.exe -V1

